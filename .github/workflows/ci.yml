name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint + tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: voltedge
          POSTGRES_PASSWORD: voltedge
          POSTGRES_DB: voltedge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U voltedge -d voltedge"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check app
      - name: Tests + coverage (pytest)
        env:
          DATABASE_URL: postgresql://voltedge:voltedge@localhost:5432/voltedge
        run: pytest --cov=app --cov-report=term-missing

  frontend:
    name: Frontend — type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build (tsc + vite)
        run: npm run build

  docker:
    name: Docker — build all images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build
