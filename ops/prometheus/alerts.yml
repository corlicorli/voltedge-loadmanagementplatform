groups:
  - name: voltedge-load-control
    rules:
      - alert: LoadControlApiDown
        expr: up{job="load-control"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Load Control API is unreachable"
          description: "Prometheus cannot scrape backend:8000/metrics for over 1 minute."

      - alert: HighApiErrorRate
        expr: sum(rate(http_requests_total{status="5xx"}[5m])) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Elevated 5xx error rate on the Load Control API"
          description: "5xx responses exceed 0.1/s over the last 5 minutes."

      - alert: HighRequestLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_highr_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency above 1s"
          description: "95th percentile request latency exceeded 1 second over the last 5 minutes."
