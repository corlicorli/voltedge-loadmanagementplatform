global:
  scrape_interval: 5s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Operational metrics from the Load Control Service (API/service health only).
  - job_name: load-control
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  # Prometheus self-monitoring.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
